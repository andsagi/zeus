<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Zeus App - IA Profissional & Produtividade</title>
    <meta name="description" content="Domine sua rotina com o Zeus. Assistente de IA avançado para gestão de notas, finanças e inteligência geográfica completa." />
    <meta name="keywords" content="IA, produtividade, gestão financeira, mapas, geoprocessamento, automação, assistente virtual" />
    <meta name="author" content="Zeus Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zeus App - IA Profissional & Produtividade" />
    <meta property="og:description" content="O próximo nível da sua produtividade com inteligência artificial especializada." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1614728263952-84ea256f9679?q=80&w=1200&h=630&fit=crop" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Zeus App - IA Profissional" />
    <meta property="twitter:description" content="Assistente de IA para professionals de alta performance." />
    
    <!-- PWA & Mobile Web App Capabilities -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zeus" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1614728263952-84ea256f9679?q=80&w=192&h=192&fit=crop" />

    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Simple PWA Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('Zeus ServiceWorker registered successfully:', reg.scope);
          }).catch(err => {
            console.warn('Zeus ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
